# The Atlantis "Council of Un" campaign layer is deliberately NOT catalogued here
# (it is kept separate from the system per the 2026-07-07 ruling).
#
# To add a document: drop its files in site/static/archive/docs/ (the .dc.html,
# which loads ./support.js) and site/static/archive/pdf/ (the .pdf), then add a
# [[era.doc]] entry below. `pdf` and `tag` are optional.

