# The work timeline shown on the landing page. This file IS what the site
# renders (via load_data in templates/index.html). It is the committed mirror of
# the GitHub Issues tracker: issues labelled `timeline` are the source; this file
# is regenerated from them (ask Claude to "sync the timeline", or run the sync).
#
# status: "done" | "active" | "planned"
# `when` is a free display label (a month, a date, "Now", "Next", "Later").
# `link.url` is a site-relative path passed through get_url (e.g. "archive/").
# Order top-to-bottom is oldest-to-newest; keep it chronological.

[[milestone]]
when = "Jun 2026"
title = "The insight engine"
status = "done"
summary = "The first question — what a table loses when it sets down the dice — is answered in the Silver Surfer papers: every answer comes seized at a price, or given as grace."
  [[milestone.link]]
  label = "The Archive"
  url = "archive/"

[[milestone]]
when = "Jul 2026"
title = "Council becomes a system"
status = "done"
summary = "The design plan turns a table's habit into a portable game. Early 'earned-grace' drafts are tried and set aside; the reward of cleverness is settled as 'Slack.'"
  [[milestone.link]]
  label = "The Archive"
  url = "archive/"

[[milestone]]
when = "Jul 2026"
title = "The five Books settled"
status = "done"
summary = "Foundations and Books Two through Five, plus the Quick Guide, reach their current form. The default table is set narrow; the fiction is named 'the weave.'"
  [[milestone.link]]
  label = "The Archive"
  url = "archive/"

[[milestone]]
when = "Jul 2026"
title = "The Handbook, bound"
status = "done"
summary = "The five Books are packaged for reading — a browsable hub for the screen, and a continuous edition built for print and the reMarkable."
  [[milestone.link]]
  label = "The Archive"
  url = "archive/"

[[milestone]]
when = "Jul 6"
title = "Onto the domain"
status = "done"
summary = "fuckinphilosophers.com goes live — a Nix-built site published to GitHub Pages, with the landing page as its first face."

[[milestone]]
when = "Jul 7"
title = "The site takes shape"
status = "done"
summary = "The site is rebuilt on Zola: the landing, the Handbook workspace, and the Council of Un corner are each framed in and ready to grow."

[[milestone]]
when = "Jul 7"
title = "The margin review → Handbook v3"
status = "done"
summary = "The Handbook is printed and marked up by hand; the notes become a Review Edition, a 41-comment editorial pass, and the clean cut of v3 — with the tagline settled ('The pen is mightier than the die') and the byline made canon: by Sir Landis Fishman."
  [[milestone.link]]
  label = "The Archive"
  url = "archive/"
  [[milestone.link]]
  label = "The Handbook"
  url = "rules/"

[[milestone]]
when = "Jul 8"
title = "The first table kit (MVP)"
status = "done"
summary = "Not the final copy to be played with, but a moment worth keeping: the Standing Orders player binder, the Works play cards, and the keeper's sealed booklet — the system first in hand at the table."
  [[milestone.link]]
  label = "The Archive"
  url = "archive/"

[[milestone]]
when = "Jul 9"
title = "The whole book, on the web"
status = "done"
summary = "The Handbook goes live to read in the browser — How to Play and Books I–V as native chapters at /rules/ — and the bound Print Edition is swapped in beside it. The provisional 'Words of the Table' glossary is retired, its terms now carried by the Eight Timbers."
  [[milestone.link]]
  label = "The Handbook"
  url = "rules/"

[[milestone]]
when = "Now"
title = "The designer's pass"
status = "active"
summary = "The bound edition is current and the whole book reads on the web; next it goes to a designer for a full typographic pass, after which the print PDF is replaced with the finished setting."
  [[milestone.link]]
  label = "The Handbook"
  url = "rules/"

[[milestone]]
when = "Next"
title = "The designed edition"
status = "planned"
summary = "When the typographic pass returns, the finished setting replaces the interim print PDF, and the web chapters are re-cut to match."
  [[milestone.link]]
  label = "The Handbook"
  url = "rules/"

[[milestone]]
when = "Later"
title = "Council of Un — table tools"
status = "planned"
summary = "Interactive tools for the campaign corner, on their own track and kept separate from the system itself."
  [[milestone.link]]
  label = "Council of Un"
  url = "un/"
