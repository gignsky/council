<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="{{ current_url | default(value=config.base_url) }}">
<meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
<meta property="og:site_name" content="{{ config.title }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script>(function(){try{var t=localStorage.getItem('council-theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}document.documentElement.dataset.theme=t;}catch(e){}})();</script>
