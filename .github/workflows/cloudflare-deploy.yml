name: Deploy site to Cloudflare Workers

# Cloudflare's own dashboard-connected Git integration build can't build
# this site: its build container has no Nix, so it runs straight to
# `wrangler versions upload` against an empty repo checkout and fails
# ("assets.directory" ./public doesn't exist — see
# .github/workflows/cloudflare-build-debug.yml for a reproduction).
#
# So the build happens here instead, using the same Nix setup check.yml
# already proves works, and this workflow pushes the built output to
# Cloudflare directly via wrangler. Cloudflare's own Git-integration
# build/deploy should be disabled (Worker → Settings → Build) so it isn't
# racing this workflow or reporting a stale failing check.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build the site with Nix
        run: nix build .#site --print-build-logs

      - name: Materialise the artifact directory
        run: |
          rm -rf public
          cp -rL result public
          chmod -R u+w public

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
